<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Centralized Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .register-card {
            max-width: 500px;
        }
        .success-message {
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
            font-size: 13.5px;
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: left;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card register-card glass">
            <div class="logo-section">
                <div class="logo-icon" style="width: 50px; height: 50px; border-radius: 11px;">
                    <svg viewBox="0 0 24 24" style="width: 26px; height: 26px;">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <line x1="19" y1="8" x2="19" y2="14"></line>
                        <line x1="16" y1="11" x2="22" y2="11"></line>
                    </svg>
                </div>
                <h1 class="logo-title" style="font-size: 22px;">Create Account</h1>
                <p class="auth-subtitle">Register to request access to the centralized portal</p>
            </div>

            <!-- Error Banner -->
            <div id="errorBanner" class="error-message">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="errorMessageText">Invalid details provided.</span>
            </div>

            <!-- Success Banner -->
            <div id="successBanner" class="success-message">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Registration successful! Redirecting to login...</span>
            </div>

            <!-- Register Form -->
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label class="form-label" for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input class="form-input" type="text" id="fullName" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="16" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="4"></line>
                            <line x1="8" y1="2" x2="8" y2="4"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                        <input class="form-input" type="text" id="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input class="form-input" type="email" id="email" placeholder="email@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="department">Department</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                        </svg>
                        <input class="form-input" type="text" id="department" placeholder="e.g. HR, Finance, IT" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="role">Requested Role</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        </svg>
                        <select class="form-input" id="role" required style="background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding-left: 45px; -webkit-appearance: none; -moz-appearance: none; appearance: none; height: 46px; cursor: pointer; width: 100%;">
                            <option value="ROLE_HR" style="background: #151521; color: #fff;">HR Employee (Standard)</option>
                            <option value="ROLE_FINANCE" style="background: #151521; color: #fff;">Finance Employee (Standard)</option>
                            <option value="ROLE_IT" style="background: #151521; color: #fff;">IT Specialist (Standard)</option>
                            <option value="ROLE_ADMIN" style="background: #151521; color: #fff;">System Administrator (Admin)</option>
                        </select>
                        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-secondary); pointer-events: none;">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input class="form-input" type="password" id="password" placeholder="Choose a secure password" required>
                    </div>
                </div>

                <button class="btn btn-primary" type="submit" id="btnRegister">
                    <span>Register</span>
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
            
            <p style="margin-top: 20px; font-size: 13.5px; color: var(--text-secondary);">
                Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const fullNameInput = document.getElementById("fullName");
            const usernameInput = document.getElementById("username");
            const emailInput = document.getElementById("email");
            const departmentInput = document.getElementById("department");
            const roleInput = document.getElementById("role");
            const passwordInput = document.getElementById("password");
            
            const errorBanner = document.getElementById("errorBanner");
            const successBanner = document.getElementById("successBanner");
            const errorMessageText = document.getElementById("errorMessageText");
            const submitBtn = document.getElementById("btnRegister");

            submitBtn.disabled = true;
            submitBtn.querySelector("span").textContent = "Creating Account...";
            errorBanner.style.display = "none";
            successBanner.style.display = "none";

            try {
                const response = await fetch("/api/auth/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value,
                        email: emailInput.value.trim(),
                        department: departmentInput.value.trim(),
                        fullName: fullNameInput.value.trim(),
                        role: roleInput.value
                    })
                });

                if (response.ok) {
                    successBanner.style.display = "flex";
                    setTimeout(() => {
                        window.location.href = "/login?registered=true";
                    }, 2000);
                } else {
                    const data = await response.json();
                    errorMessageText.textContent = data.message || "Registration failed. Try again.";
                    errorBanner.style.display = "flex";
                    submitBtn.disabled = false;
                    submitBtn.querySelector("span").textContent = "Register";
                }
            } catch (err) {
                errorMessageText.textContent = "Network error connecting to the registration service.";
                errorBanner.style.display = "flex";
                submitBtn.disabled = false;
                submitBtn.querySelector("span").textContent = "Register";
                console.error(err);
            }
        }
    </script>
</body>
</html>
