<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Centralized Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .logout-card {
            max-width: 400px;
        }
        .logout-icon-glow {
            width: 60px;
            height: 60px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }
        .logout-icon-glow svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card logout-card glass">
            <div class="logout-icon-glow">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </div>
            
            <h1 class="welcome-title" style="font-size: 24px; margin-bottom: 12px;">Logged Out Safely</h1>
            <p class="auth-subtitle" style="margin-bottom: 30px;">Your session has been terminated. You can now close this tab or sign back in.</p>
            
            <a href="/login" class="btn btn-primary" style="text-decoration: none;">
                <span>Go to Login</span>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
