<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centralized Portal</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="logo-section">
                <div class="logo-icon">
                    <!-- SVG Grid Icon -->
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="3" width="7" height="7" rx="1.5" />
                        <rect x="14" y="3" width="7" height="7" rx="1.5" />
                        <rect x="14" y="14" width="7" height="7" rx="1.5" />
                        <rect x="3" y="14" width="7" height="7" rx="1.5" />
                    </svg>
                </div>
                <h1 class="logo-title">Centralized Login Portal</h1>
                <p class="auth-subtitle">Sign in to access your authorized applications</p>
            </div>

            <!-- Error Banner -->
            <div id="errorBanner" class="error-message">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="errorMessageText">Invalid credentials</span>
            </div>

            <!-- Success Banner -->
            <div id="successBanner" style="background: var(--success-bg); border: 1px solid rgba(16, 185, 129, 0.2); color: #a7f3d0; font-size: 13.5px; padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; display: none; text-align: left; align-items: center; gap: 8px;">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span>Registration successful! You can now sign in.</span>
            </div>

            <!-- Standard Credentials Login -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <!-- User SVG Icon -->
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input class="form-input" type="text" id="username" placeholder="Enter username (e.g. admin, user)" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <!-- Lock SVG Icon -->
                        <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input class="form-input" type="password" id="password" placeholder="Enter password (e.g. admin, user)" required>
                    </div>
                </div>

                <button class="btn btn-primary" type="submit" id="btnLogin">
                    <span>Sign In</span>
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <div class="divider">or</div>

            <!-- SSO Login -->
            <button class="btn btn-sso" id="btnSSO" onclick="handleSSOLogin()" style="margin-bottom: 20px;">
                <!-- Shield/Key SVG Icon -->
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Login with SSO</span>
            </button>

            <p style="font-size: 13.5px; color: var(--text-secondary);">
                Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register Now</a>
            </p>
        </div>
    </div>

    <script>
        // Check if registration was successful
        window.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get("registered") === "true") {
                document.getElementById("successBanner").style.display = "flex";
            }
        });

        // Set standard credentials hint in console
        console.log("Demo Credentials:\n1. Admin: admin / admin (Full Access + Audit Logs)\n2. Standard: user / user (Restricted Access)");

        async function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById("username");
            const passwordInput = document.getElementById("password");
            const errorBanner = document.getElementById("errorBanner");
            const errorMessageText = document.getElementById("errorMessageText");
            const submitBtn = document.getElementById("btnLogin");

            // Disable button, show loading
            submitBtn.disabled = true;
            submitBtn.querySelector("span").textContent = "Authenticating...";
            errorBanner.style.display = "none";

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                if (response.ok) {
                    // Success, redirect to portal main screen
                    window.location.href = "/dashboard";
                } else {
                    const data = await response.json();
                    errorMessageText.textContent = data.message || "Invalid username or password";
                    errorBanner.style.display = "flex";
                }
            } catch (err) {
                errorMessageText.textContent = "Network error. Please verify the backend is running.";
                errorBanner.style.display = "flex";
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector("span").textContent = "Sign In";
            }
        }

        function handleSSOLogin() {
            // Redirect the user to Spring Security's OAuth2 authorization endpoint for WSO2
            window.location.href = "/oauth2/authorization/wso2";
        }
    </script>
</body>
</html>
