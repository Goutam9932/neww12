<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unauthorized - Centralized Portal</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .error-card {
            max-width: 450px;
        }
        .error-icon-glow {
            width: 60px;
            height: 60px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }
        .error-icon-glow svg {
            width: 30px;
            height: 30px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card error-card glass">
            <div class="error-icon-glow">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
                </svg>
            </div>
            
            <h1 class="welcome-title" style="font-size: 24px; margin-bottom: 12px;">Access Denied / Error</h1>
            <p class="auth-subtitle" style="margin-bottom: 30px; line-height: 1.6;">You are not authorized to view the requested resource or an error occurred during request verification. Please contact system administrators.</p>
            
            <a href="/dashboard" class="btn btn-primary" style="text-decoration: none;">
                <span>Return to Dashboard</span>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
